services:
  reminder-bot:
    image: ghcr.io/lucanori/reminder-bot:latest
    container_name: reminder-bot
    user: ${PUID}:${PGID}
    restart: unless-stopped
    pull_policy: always
    depends_on:
      - postgres
    volumes:
      - ${APPDATA}/reminder-bot:/app/data:rw
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - BOT_MODE=blocklist
      - DEFAULT_NOTIFICATION_INTERVAL=5
      - MAX_NOTIFICATIONS_PER_REMINDER=10
      - REMINDER_BOT_DB_HOST=postgres
      - REMINDER_BOT_DB_PORT=5432
      - REMINDER_BOT_DB_USER=reminderbot
      - REMINDER_BOT_DB_PASSWORD=reminderbot
      - REMINDER_BOT_DB_NAME=reminderbot
      - DEBUG=false
      - LOG_LEVEL=INFO
      - TIMEZONE=${TZ}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:18
    container_name: reminder-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reminderbot
      POSTGRES_USER: reminderbot
      POSTGRES_PASSWORD: reminderbot
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reminderbot -d reminderbot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
