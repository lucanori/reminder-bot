services:
  reminder-bot:
    build: .
    container_name: reminder-bot-local
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8008:8000"
    volumes:
      - reminder-bot-data:/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - BOT_MODE=blocklist
      - DEFAULT_NOTIFICATION_INTERVAL=5
      - MAX_NOTIFICATIONS_PER_REMINDER=10
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=reminderbot
      - DB_PASSWORD=reminderbot
      - DB_NAME=reminderbot
      - DEBUG=false
      - LOG_LEVEL=INFO
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:18
    container_name: reminder-bot-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: reminderbot
      POSTGRES_USER: reminderbot
      POSTGRES_PASSWORD: reminderbot
    volumes:
      - reminder-bot-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reminderbot -d reminderbot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  reminder-bot-data:
  reminder-bot-pgdata:
